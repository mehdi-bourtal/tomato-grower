name: tomato_grower
description: A premium tomato cultivation monitoring app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  go_router: ^14.8.1
  fl_chart: ^0.70.2
  phosphor_flutter: ^2.1.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0
  workmanager: ^0.5.2
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
